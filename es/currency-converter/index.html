<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Conversor de monedas para América Latina. Convierte entre MXN, ARS, CLP, PEN, COP y USD con tasas indicativas.">
    <meta name="keywords" content="conversor de monedas, tipo de cambio, MXN, ARS, CLP, PEN, COP, USD, América Latina, pesos mexicanos, pesos argentinos, pesos chilenos">
    <meta name="author" content="BaiGei Tools">
    <title>Conversor de Monedas - América Latina</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2082456546225568" crossorigin="anonymous"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-white shadow-md py-3 px-4">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <a href="https://wdnmd.vip/" class="text-gray-600 hover:text-gray-900 text-sm">&larr; Inicio</a>
            <span class="text-gray-400 text-xs">BaiGei Tools</span>
        </div>
    </nav>

    <div class="max-w-3xl mx-auto px-4 py-8">
        <header class="text-center mb-8">
            <h1 class="text-3xl md:text-4xl font-bold text-gray-800 mb-2">Conversor de Monedas</h1>
            <p class="text-gray-500">Convierte entre monedas de América Latina</p>
        </header>

        <div class="bg-white rounded-2xl shadow-md p-6 md:p-8 border border-gray-200 mb-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Cantidad</label>
                    <input type="number" id="cantidad" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-emerald-400 focus:outline-none text-lg" value="1" min="0" step="0.01">
                </div>
                <div class="flex items-end gap-2">
                    <div class="flex-1">
                        <label class="block text-sm font-medium text-gray-700 mb-2">De</label>
                        <select id="monedaOrigen" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-emerald-400 focus:outline-none bg-white">
                            <option value="MXN">🇲🇽 MXN - Peso Mexicano</option>
                            <option value="ARS">🇦🇷 ARS - Peso Argentino</option>
                            <option value="CLP">🇨🇱 CLP - Peso Chileno</option>
                            <option value="PEN">🇵🇪 PEN - Sol Peruano</option>
                            <option value="COP">🇨🇴 COP - Peso Colombiano</option>
                            <option value="USD" selected>🇺🇸 USD - Dólar Estadounidense</option>
                        </select>
                    </div>
                    <button onclick="intercambiar()" class="bg-gray-100 p-3 rounded-xl hover:bg-gray-200 transition mb-0.5">
                        <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4"/></svg>
                    </button>
                    <div class="flex-1">
                        <label class="block text-sm font-medium text-gray-700 mb-2">A</label>
                        <select id="monedaDestino" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-emerald-400 focus:outline-none bg-white">
                            <option value="MXN" selected>🇲🇽 MXN - Peso Mexicano</option>
                            <option value="ARS">🇦🇷 ARS - Peso Argentino</option>
                            <option value="CLP">🇨🇱 CLP - Peso Chileno</option>
                            <option value="PEN">🇵🇪 PEN - Sol Peruano</option>
                            <option value="COP">🇨🇴 COP - Peso Colombiano</option>
                            <option value="USD">🇺🇸 USD - Dólar Estadounidense</option>
                        </select>
                    </div>
                </div>
            </div>

            <button onclick="convertir()" class="w-full bg-emerald-600 text-white py-3.5 rounded-xl hover:bg-emerald-700 transition font-semibold text-lg shadow-sm mb-4">Convertir</button>

            <div id="resultado" class="hidden">
                <div class="bg-gradient-to-r from-emerald-50 to-teal-50 rounded-xl p-6 border border-emerald-200">
                    <p class="text-sm text-gray-500 mb-1" id="resultadoLabel"></p>
                    <p class="text-3xl font-bold text-emerald-700" id="resultadoValor"></p>
                    <p class="text-xs text-gray-400 mt-2">* Tasas indicativas - Los valores reales pueden variar</p>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-md p-6 border border-gray-200">
            <h3 class="text-lg font-semibold text-gray-800 mb-4">Tasas de Referencia (vs USD)</h3>
            <div class="overflow-x-auto">
                <table class="w-full text-sm">
                    <thead class="text-left text-gray-500 border-b">
                        <tr>
                            <th class="pb-2">Moneda</th>
                            <th class="pb-2">Código</th>
                            <th class="pb-2 text-right">1 USD =</th>
                        </tr>
                    </thead>
                    <tbody class="text-gray-700" id="tablaTasas">
                    </tbody>
                </table>
            </div>
            <p class="text-xs text-gray-400 mt-3">* Tasas indicativas actualizadas periódicamente</p>
        </div>
    </div>

    <footer class="text-center py-6 text-gray-400 text-sm">
        <p>&copy; 2026 BaiGei Tools</p>
    </footer>

    <script>
        // Tasas de cambio fijas aproximadas (respecto a 1 USD)
        const TASAS = {
            USD: 1,
            MXN: 20.50,   // Peso Mexicano
            ARS: 1020.00, // Peso Argentino
            CLP: 950.00,  // Peso Chileno
            PEN: 3.75,    // Sol Peruano
            COP: 3950.00  // Peso Colombiano
        };

        const INFO_MONEDAS = {
            USD: { nombre: 'Dólar Estadounidense', bandera: '🇺🇸' },
            MXN: { nombre: 'Peso Mexicano', bandera: '🇲🇽' },
            ARS: { nombre: 'Peso Argentino', bandera: '🇦🇷' },
            CLP: { nombre: 'Peso Chileno', bandera: '🇨🇱' },
            PEN: { nombre: 'Sol Peruano', bandera: '🇵🇪' },
            COP: { nombre: 'Peso Colombiano', bandera: '🇨🇴' }
        };

        function init() {
            const tbody = document.getElementById('tablaTasas');
            const monedas = ['MXN', 'ARS', 'CLP', 'PEN', 'COP'];
            monedas.forEach(cod => {
                const tr = document.createElement('tr');
                tr.className = 'border-b border-gray-100 last:border-0';
                tr.innerHTML = `<td class="py-2">${INFO_MONEDAS[cod].bandera} ${INFO_MONEDAS[cod].nombre}</td>
                                <td class="py-2">${cod}</td>
                                <td class="py-2 text-right font-medium">${TASAS[cod].toLocaleString('es-ES', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}</td>`;
                tbody.appendChild(tr);
            });
        }

        function convertir() {
            const cantidad = parseFloat(document.getElementById('cantidad').value) || 0;
            const origen = document.getElementById('monedaOrigen').value;
            const destino = document.getElementById('monedaDestino').value;

            const enUSD = cantidad / TASAS[origen];
            const resultado = enUSD * TASAS[destino];

            const label = `${cantidad.toLocaleString('es-ES', { minimumFractionDigits: 2, maximumFractionDigits: 2 })} ${origen} =`;
            const valor = `${resultado.toLocaleString('es-ES', { minimumFractionDigits: 2, maximumFractionDigits: 2 })} ${destino}`;

            document.getElementById('resultadoLabel').textContent = label;
            document.getElementById('resultadoValor').textContent = valor;
            document.getElementById('resultado').classList.remove('hidden');
        }

        function intercambiar() {
            const origen = document.getElementById('monedaOrigen');
            const destino = document.getElementById('monedaDestino');
            const temp = origen.value;
            origen.value = destino.value;
            destino.value = temp;
            convertir();
        }

        // Conversión automática al cambiar inputs
        document.getElementById('cantidad').addEventListener('input', convertir);
        document.getElementById('monedaOrigen').addEventListener('change', convertir);
        document.getElementById('monedaDestino').addEventListener('change', convertir);

        init();
        convertir();
    </script>
</body>
</html>
