        function ipToNum(ip) {
            const parts = ip.split('.');
            if (parts.length !== 4) return -1;
            for (let i = 0; i < 4; i++) {
                parts[i] = parseInt(parts[i], 10);
                if (isNaN(parts[i]) || parts[i] < 0 || parts[i] > 255) return -1;
            }
            return ((parts[0] << 24) | (parts[1] << 16) | (parts[2] << 8) | parts[3]) >>> 0;
        }

        function lookupIPInDB(ip) {
            const num = ipToNum(ip);
            if (num === -1) return null;
            for (const entry of IP_DATABASE) {
                if (num >= entry.startNum && num <= entry.endNum) return entry;
            }
            return null;
        }

        function getIPType(ip) {
            if (ip.includes(':')) return '<span class="tag tag-ipv6">IPv6</span>';
            const parts = ip.split('.');
            if (parts.length === 4) return '<span class="tag tag-ipv4">IPv4</span>';
            return '未知';
        }

        function detectBrowser() {
            const ua = navigator.userAgent;
            if (ua.includes('Chrome') && !ua.includes('Edg')) return 'Chrome';
            if (ua.includes('Firefox')) return 'Firefox';
            if (ua.includes('Safari') && !ua.includes('Chrome')) return 'Safari';
            if (ua.includes('Edg')) return 'Edge';
            if (ua.includes('OPR') || ua.includes('Opera')) return 'Opera';
            return 'Unknown';
        }

        function detectOS() {
            const ua = navigator.userAgent;
            if (ua.includes('Windows')) return 'Windows';
            if (ua.includes('Mac OS')) return 'macOS';
            if (ua.includes('Linux') && !ua.includes('Android')) return 'Linux';
            if (ua.includes('Android')) return 'Android';
            if (ua.includes('iPhone') || ua.includes('iPad')) return 'iOS';
            return 'Unknown';
        }

        function getMyIPInfo() {
            document.getElementById('myip-browser').textContent = detectBrowser();
            document.getElementById('myip-os').textContent = detectOS();
            document.getElementById('myip-resolution').textContent = screen.width + ' x ' + screen.height;
        }

        function formatLocation(entry) {
            if (!entry) return '未知';
            let loc = entry.province;
            if (entry.city && entry.city !== entry.province) loc += ' ' + entry.city;
            return loc;
        }

        function formatISP(entry) {
            if (!entry) return '<span class="isp-badge isp-未知">未知</span>';
            const isp = entry.isp;
            let cls = 'isp-未知';
            if (isp.includes('电信')) cls = 'isp-电信';
            else if (isp.includes('联通')) cls = 'isp-联通';
            else if (isp.includes('移动')) cls = 'isp-移动';
            else if (isp.includes('铁通')) cls = 'isp-铁通';
            return '<span class="isp-badge ' + cls + '">' + isp + '</span>';
        }

        function lookupIP() {
            const ip = document.getElementById('ip-input').value.trim();
            if (!ip) {
                document.getElementById('status').textContent = '请输入IP地址';
                document.getElementById('status').className = 'status-msg error';
                return;
            }
            const entry = lookupIPInDB(ip);
            document.getElementById('r-ip').textContent = ip;
            document.getElementById('r-type').innerHTML = getIPType(ip);
            document.getElementById('r-isp').innerHTML = formatISP(entry);
            document.getElementById('r-location').textContent = formatLocation(entry);
            document.getElementById('result-table').style.display = '';
            document.getElementById('status').className = 'status-msg success';
            document.getElementById('status').textContent = '查询完成';
        }

        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('ip-input').addEventListener('keyup', function(e) {
                if (e.key === 'Enter') lookupIP();
            });
        });

        (function autoDetectIP() {
            getMyIPInfo();
            fetch('https://api64.ipify.org?format=json')
                .then(function(res) { return res.json(); })
                .then(function(data) {
                    if (data && data.ip) {
                        var ip = data.ip;
                        document.getElementById('myip-ip').textContent = ip;
                        document.getElementById('ip-input').value = ip;
                        document.getElementById('status').textContent = '已自动检测到本机IP';
                        document.getElementById('status').className = 'status-msg success';
                        var entry = lookupIPInDB(ip);
                        document.getElementById('r-ip').textContent = ip;
                        document.getElementById('r-type').innerHTML = getIPType(ip);
                        document.getElementById('r-isp').innerHTML = formatISP(entry);
                        document.getElementById('r-location').textContent = formatLocation(entry);
                        document.getElementById('result-table').style.display = '';
                    } else {
                        document.getElementById('status').textContent = '无法自动检测，请手动输入IP地址';
                        document.getElementById('status').className = 'status-msg error';
                    }
                })
                .catch(function() {
                    document.getElementById('status').textContent = '无法自动检测，请手动输入IP地址';
                    document.getElementById('status').className = 'status-msg error';
                });
        })();
