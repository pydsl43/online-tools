    <script>
        function updatePreview() {
            const name = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const summary = document.getElementById('summary').value.trim();
            const experience = document.getElementById('experience').value.trim();
            const education = document.getElementById('education').value.trim();
            const skills = document.getElementById('skills').value.trim();

            if (!name && !email && !phone && !summary && !experience && !education && !skills) {
                document.getElementById('resumePreview').innerHTML = `
                    <div class="text-center text-gray-400 py-12">
                        <svg class="w-12 h-12 mx-auto mb-3 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                        <p class="text-sm">Fill in the form to see your resume preview</p>
                    </div>
                `;
                return;
            }

            let html = '';

            // Name
            if (name) {
                html += `<h1>${escapeHtml(name)}</h1>`;
            }

            // Contact
            const contactParts = [];
            if (email) contactParts.push(escapeHtml(email));
            if (phone) contactParts.push(escapeHtml(phone));
            if (contactParts.length > 0) {
                html += `<div class="contact-line">${contactParts.join(' &nbsp;|&nbsp; ')}</div>`;
            }

            // Summary
            if (summary) {
                html += `<div class="section-title">Professional Summary</div>`;
                html += `<div class="summary-text">${escapeHtml(summary)}</div>`;
            }

            // Experience
            if (experience) {
                html += `<div class="section-title">Experience</div>`;
                const lines = experience.split('\n').filter(l => l.trim());
                let inBullet = false;
                lines.forEach(line => {
                    const trimmed = line.trim();
                    if (trimmed.startsWith('-') || trimmed.startsWith('•')) {
                        html += `<div class="exp-desc" style="margin-left:12px;">${escapeHtml(trimmed)}</div>`;
                    } else if (trimmed.includes('|')) {
                        const parts = trimmed.split('|').map(p => p.trim());
                        html += `<div class="exp-item"><div class="exp-title">${escapeHtml(parts[0])}</div>`;
                        if (parts.length > 1) {
                            html += `<div class="exp-sub">${escapeHtml(parts[1])}`;
                            if (parts.length > 2) html += ` &nbsp;|&nbsp; ${escapeHtml(parts[2])}`;
                            html += `</div>`;
                        }
                        html += `</div>`;
                    } else {
                        html += `<div class="exp-desc">${escapeHtml(trimmed)}</div>`;
                    }
                });
            }

            // Education
            if (education) {
                html += `<div class="section-title">Education</div>`;
                const lines = education.split('\n').filter(l => l.trim());
                lines.forEach(line => {
                    const trimmed = line.trim();
                    if (trimmed.startsWith('-') || trimmed.startsWith('•')) {
                        html += `<div class="exp-desc" style="margin-left:12px;">${escapeHtml(trimmed)}</div>`;
                    } else if (trimmed.includes('|')) {
                        const parts = trimmed.split('|').map(p => p.trim());
                        html += `<div class="edu-item"><div class="edu-title">${escapeHtml(parts[0])}</div>`;
                        if (parts.length > 1) {
                            html += `<div class="edu-sub">${escapeHtml(parts[1])}`;
                            if (parts.length > 2) html += ` &nbsp;|&nbsp; ${escapeHtml(parts[2])}`;
                            html += `</div>`;
                        }
                        html += `</div>`;
                    } else {
                        html += `<div class="exp-desc">${escapeHtml(trimmed)}</div>`;
                    }
                });
            }

            // Skills
            if (skills) {
                html += `<div class="section-title">Skills</div>`;
                const skillItems = skills.split(',').map(s => s.trim()).filter(s => s);
                html += `<div class="skills-list">`;
                skillItems.forEach(skill => {
                    html += `<span class="skill-tag">${escapeHtml(skill)}</span>`;
                });
                html += `</div>`;
            }

            document.getElementById('resumePreview').innerHTML = html;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function downloadPDF() {
            window.print();
        }
    </script>
</body>
