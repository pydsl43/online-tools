name: Ping Search Engines

on:
  schedule:
    # Run daily at 6:00 AM UTC (2:00 PM CST)
    - cron: '0 6 * * *'
  workflow_dispatch:
    # Allow manual trigger
  push:
    branches: [main]
    paths:
      - 'sitemap.xml'
      - '**/index.html'

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Deprecated: Google discontinued the sitemap ping endpoint (returns 404).
      - name: Ping Google (deprecated)
        continue-on-error: true
        run: |
          curl -s -o /dev/null -w "%{http_code}\n" \
            "https://www.google.com/ping?sitemap=https://wdnmd.vip/sitemap.xml" || true

      # Deprecated: Bing discontinued the sitemap ping endpoint (returns 410).
      - name: Ping Bing (deprecated)
        continue-on-error: true
        run: |
          curl -s -o /dev/null -w "%{http_code}\n" \
            "https://www.bing.com/ping?sitemap=https://wdnmd.vip/sitemap.xml" || true

      - name: Baidu API Push (quota-aware, 10 URLs/day)
        env:
          BAIDU_TOKEN: ${{ secrets.BAIDU_TOKEN }}
        run: |
          set -euo pipefail
          TOKEN="${BAIDU_TOKEN:-6oMAGbJv1JJXIUVI}"
          DAY=$(date +%j)
          URLS=$(grep -oP '<loc>\s*\Khttps://wdnmd\.vip[^<]+' sitemap.xml | sort)
          TOTAL=$(echo "$URLS" | wc -l | tr -d ' ')
          if [ "$TOTAL" -eq 0 ]; then
            echo "No URLs found in sitemap.xml"
            exit 1
          fi
          mapfile -t URL_ARRAY < <(printf '%s\n' "$URLS")
          START=$(( (DAY * 10) % TOTAL ))
          : > /tmp/baidu_urls.txt
          for (( i=0; i<10; i++ )); do
            echo "${URL_ARRAY[$(( (START + i) % TOTAL ))]}" >> /tmp/baidu_urls.txt
          done
          echo "Pushing $(wc -l < /tmp/baidu_urls.txt | tr -d ' ') URLs (offset $((START + 1)) of $TOTAL):"
          cat /tmp/baidu_urls.txt
          RESP=$(curl -s -H 'Content-Type:text/plain' --data-binary @/tmp/baidu_urls.txt \
            "http://data.zz.baidu.com/urls?site=wdnmd.vip&token=${TOKEN}")
          echo "$RESP"
          if echo "$RESP" | grep -q 'over quota'; then
            echo "Baidu daily push quota exhausted; will retry tomorrow."
            exit 0
          fi
          echo "$RESP" | grep -q '"error"' && exit 1 || true
          echo "$RESP" | grep -q '"success"' || exit 1
