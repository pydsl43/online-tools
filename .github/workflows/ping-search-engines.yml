name: Ping Search Engines

on:
  schedule:
    # Run daily at 6:00 AM UTC (2:00 PM CST)
    - cron: '0 6 * * *'
  workflow_dispatch:
    # Allow manual trigger
  push:
    branches: [main]
    paths:
      - 'sitemap.xml'
      - '**/index.html'

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ping Google
        run: |
          curl -s -o /dev/null -w "%{http_code}\n" \
            "https://www.google.com/ping?sitemap=https://wdnmd.vip/sitemap.xml"
          
      - name: Ping Bing
        run: |
          curl -s -o /dev/null -w "%{http_code}\n" \
            "https://www.bing.com/ping?sitemap=https://wdnmd.vip/sitemap.xml"

      - name: Baidu API Push (all URLs from sitemap)
        run: |
          # Extract all URLs from sitemap.xml and push via Baidu API
          # API push works without ICP filing (unlike sitemap tool)
          URLS=$(grep -oP '<loc>\s*\Khttps://wdnmd\.vip[^<]+' sitemap.xml || true)
          if [ -n "$URLS" ]; then
            echo "$URLS" | curl -s \
              -H 'Content-Type:text/plain' \
              --data-binary @- \
              "http://data.zz.baidu.com/urls?site=wdnmd.vip&token=6oMAGbJv1JJXIUVI"
          else
            echo "No URLs found in sitemap.xml"
          fi
