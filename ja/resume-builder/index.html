<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>履歴書作成 - 無料オンライン履歴書メーカー</title>
    <meta name="description" content="無料で使えるオンライン履歴書作成ツール。氏名・学歴・職歴・資格などを入力して、印刷可能な履歴書を簡単に作成。">
    <script src="https://cdn.tailwindcss.com"></script>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2082456546225568" crossorigin="anonymous"></script>
    <style>
        @media print {
            body { background: white !important; }
            .no-print { display: none !important; }
            .print-content { box-shadow: none !important; margin: 0 !important; padding: 0 !important; }
            .print-content { page-break-after: always; }
            @page { margin: 15mm; }
        }
        .resume-table {
            width: 100%;
            border-collapse: collapse;
        }
        .resume-table th, .resume-table td {
            border: 1px solid #333;
            padding: 8px 12px;
            font-size: 11pt;
        }
        .resume-table th {
            background: #f3f4f6;
            width: 120px;
            text-align: center;
            font-weight: 600;
        }
        .resume-table td {
            vertical-align: top;
        }
        .resume-title {
            font-size: 24pt;
            font-weight: bold;
            text-align: center;
            letter-spacing: 8px;
            margin-bottom: 16px;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-4xl">
        <a href="/?lang=ja" class="text-gray-500 hover:text-gray-700 text-sm mb-4 inline-block no-print">&larr; トップへ戻る</a>
        
        <div class="text-center mb-8 no-print">
            <h1 class="text-3xl font-bold text-gray-800 mb-2">📄 履歴書作成</h1>
            <p class="text-gray-500">無料オンライン履歴書メーカー</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <!-- Form -->
            <div class="bg-white rounded-2xl shadow-lg p-6 no-print">
                <h2 class="text-lg font-bold text-gray-800 mb-4 border-b pb-2">入力フォーム</h2>
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">氏名 <span class="text-red-500">*</span></label>
                        <div class="grid grid-cols-2 gap-2">
                            <input type="text" id="lastName" placeholder="姓" class="w-full px-3 py-2 rounded-lg border border-gray-300 focus:border-blue-500 focus:outline-none">
                            <input type="text" id="firstName" placeholder="名" class="w-full px-3 py-2 rounded-lg border border-gray-300 focus:border-blue-500 focus:outline-none">
                        </div>
                        <div class="grid grid-cols-2 gap-2 mt-1">
                            <input type="text" id="lastNameKana" placeholder="セイ" class="w-full px-3 py-2 rounded-lg border border-gray-300 focus:border-blue-500 focus:outline-none text-sm">
                            <input type="text" id="firstNameKana" placeholder="メイ" class="w-full px-3 py-2 rounded-lg border border-gray-300 focus:border-blue-500 focus:outline-none text-sm">
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">生年月日 <span class="text-red-500">*</span></label>
                        <input type="date" id="birthDate" class="w-full px-3 py-2 rounded-lg border border-gray-300 focus:border-blue-500 focus:outline-none">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">住所 <span class="text-red-500">*</span></label>
                        <input type="text" id="address" placeholder="東京都千代田区..." class="w-full px-3 py-2 rounded-lg border border-gray-300 focus:border-blue-500 focus:outline-none">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">電話番号</label>
                        <input type="tel" id="phone" placeholder="090-1234-5678" class="w-full px-3 py-2 rounded-lg border border-gray-300 focus:border-blue-500 focus:outline-none">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">メールアドレス</label>
                        <input type="email" id="email" placeholder="example@email.com" class="w-full px-3 py-2 rounded-lg border border-gray-300 focus:border-blue-500 focus:outline-none">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">学歴</label>
                        <textarea id="education" rows="4" placeholder="20XX年4月  ○○大学 △△学部 入学&#10;20XX年3月  ○○大学 △△学部 卒業" class="w-full px-3 py-2 rounded-lg border border-gray-300 focus:border-blue-500 focus:outline-none resize-y"></textarea>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">職歴</label>
                        <textarea id="workHistory" rows="4" placeholder="20XX年4月  ○○株式会社 入社&#10;20XX年3月  ○○株式会社 退職" class="w-full px-3 py-2 rounded-lg border border-gray-300 focus:border-blue-500 focus:outline-none resize-y"></textarea>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">資格・免許</label>
                        <textarea id="qualifications" rows="3" placeholder="20XX年 普通自動車免許 取得&#10;20XX年 TOEIC 900点" class="w-full px-3 py-2 rounded-lg border border-gray-300 focus:border-blue-500 focus:outline-none resize-y"></textarea>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">自己PR</label>
                        <textarea id="selfPr" rows="4" placeholder="自己PRを入力してください..." class="w-full px-3 py-2 rounded-lg border border-gray-300 focus:border-blue-500 focus:outline-none resize-y"></textarea>
                    </div>

                    <button id="printBtn" class="w-full py-3 rounded-xl font-bold text-lg text-white bg-gradient-to-r from-blue-500 to-indigo-500 hover:from-blue-400 hover:to-indigo-400 transition shadow-lg">
                        🖨️ 印刷する（プレビュー）
                    </button>
                </div>
            </div>

            <!-- Preview -->
            <div id="previewArea" class="bg-white shadow-lg print-content">
                <div class="p-8">
                    <div class="resume-title">履 歴 書</div>
                    
                    <div class="text-right mb-4">
                        <span id="previewDate" class="text-sm">令和　年　月　日 現在</span>
                    </div>

                    <table class="resume-table mb-6">
                        <tr>
                            <th rowspan="4">氏名</th>
                            <td class="text-xl font-bold" id="previewName">　</td>
                            <th rowspan="4" class="w-32 h-32">
                                <div class="w-28 h-28 border border-gray-300 mx-auto flex items-center justify-center text-gray-400 text-xs">
                                    写真
                                </div>
                            </th>
                        </tr>
                        <tr>
                            <td class="text-sm text-gray-600" id="previewNameKana">　　　</td>
                        </tr>
                        <tr>
                            <td colspan="2"></td>
                        </tr>
                        <tr>
                            <td colspan="2"></td>
                        </tr>
                        <tr>
                            <th>生年月日</th>
                            <td colspan="2" id="previewBirthDate">　</td>
                        </tr>
                        <tr>
                            <th>住所</th>
                            <td colspan="2" id="previewAddress">　</td>
                        </tr>
                        <tr>
                            <th>電話番号</th>
                            <td colspan="2" id="previewPhone">　</td>
                        </tr>
                        <tr>
                            <th>メール</th>
                            <td colspan="2" id="previewEmail">　</td>
                        </tr>
                    </table>

                    <table class="resume-table mb-6">
                        <tr>
                            <th>学歴</th>
                            <td id="previewEducation" class="whitespace-pre-line">　</td>
                        </tr>
                        <tr>
                            <th>職歴</th>
                            <td id="previewWorkHistory" class="whitespace-pre-line">　</td>
                        </tr>
                    </table>

                    <table class="resume-table mb-6">
                        <tr>
                            <th>資格・免許</th>
                            <td id="previewQualifications" class="whitespace-pre-line">　</td>
                        </tr>
                    </table>

                    <table class="resume-table">
                        <tr>
                            <th>自己PR</th>
                            <td id="previewSelfPr" class="whitespace-pre-line min-h-[100px]">　</td>
                        </tr>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <footer class="text-center py-6 text-gray-400 text-sm no-print">
        <a href="/?lang=ja" class="hover:text-gray-600 transition">トップページ</a>
        <span class="mx-2">|</span>
        © 2026 BaiGei Tools
    </footer>

    <script>
        function updatePreview() {
            const lastName = document.getElementById('lastName').value;
            const firstName = document.getElementById('firstName').value;
            const lastNameKana = document.getElementById('lastNameKana').value;
            const firstNameKana = document.getElementById('firstNameKana').value;
            const birthDate = document.getElementById('birthDate').value;
            const address = document.getElementById('address').value;
            const phone = document.getElementById('phone').value;
            const email = document.getElementById('email').value;
            const education = document.getElementById('education').value;
            const workHistory = document.getElementById('workHistory').value;
            const qualifications = document.getElementById('qualifications').value;
            const selfPr = document.getElementById('selfPr').value;

            document.getElementById('previewName').textContent = lastName + ' ' + firstName || '　';
            document.getElementById('previewNameKana').textContent = lastNameKana + ' ' + firstNameKana || '　　　';
            
            if (birthDate) {
                const [y, m, d] = birthDate.split('-').map(Number);
                document.getElementById('previewBirthDate').textContent = `${y}年${m}月${d}日生`;
                
                // Calculate age
                const now = new Date();
                let age = now.getFullYear() - y;
                const monthDiff = now.getMonth() - (m - 1);
                if (monthDiff < 0 || (monthDiff === 0 && now.getDate() < d)) age--;
                document.getElementById('previewBirthDate').textContent = `${y}年${m}月${d}日生（${age}歳）`;
            } else {
                document.getElementById('previewBirthDate').textContent = '　';
            }
            
            document.getElementById('previewAddress').textContent = address || '　';
            document.getElementById('previewPhone').textContent = phone || '　';
            document.getElementById('previewEmail').textContent = email || '　';
            document.getElementById('previewEducation').textContent = education || '　';
            document.getElementById('previewWorkHistory').textContent = workHistory || '　';
            document.getElementById('previewQualifications').textContent = qualifications || '　';
            document.getElementById('previewSelfPr').textContent = selfPr || '　';

            // Date
            const now = new Date();
            const jpYear = now.getFullYear() - 2018;
            document.getElementById('previewDate').textContent = `令和${jpYear}年${now.getMonth() + 1}月${now.getDate()}日 現在`;
        }

        // Auto-update preview on input
        document.querySelectorAll('input, textarea').forEach(el => {
            el.addEventListener('input', updatePreview);
        });

        document.getElementById('printBtn').addEventListener('click', () => {
            updatePreview();
            window.print();
        });

        // Initial update
        updatePreview();
    </script>

    <!-- Language Selector -->
    <div id="lang-selector" class="flex justify-center gap-2 mb-8"></div>

    <!-- i18n -->
    <script src="/i18n/translations.js"></script>
    <script src="/i18n/i18n.js" defer></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof createLanguageSelector === 'function') {
                createLanguageSelector('lang-selector');
            }
        });
    </script>
</body>
</html>
