    <script>
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof createLanguageSelector === 'function') {
                createLanguageSelector('lang-selector');
            }
        });

    <script>
        const conversions = {
            length: [
                { from: 'Inches', to: 'Centimeters', factor: 2.54, fromUnit: 'in', toUnit: 'cm' },
                { from: 'Centimeters', to: 'Inches', factor: 0.393701, fromUnit: 'cm', toUnit: 'in' },
                { from: 'Feet', to: 'Meters', factor: 0.3048, fromUnit: 'ft', toUnit: 'm' },
                { from: 'Meters', to: 'Feet', factor: 3.28084, fromUnit: 'm', toUnit: 'ft' },
                { from: 'Miles', to: 'Kilometers', factor: 1.60934, fromUnit: 'mi', toUnit: 'km' },
                { from: 'Kilometers', to: 'Miles', factor: 0.621371, fromUnit: 'km', toUnit: 'mi' },
            ],
            weight: [
                { from: 'Pounds', to: 'Kilograms', factor: 0.453592, fromUnit: 'lb', toUnit: 'kg' },
                { from: 'Kilograms', to: 'Pounds', factor: 2.20462, fromUnit: 'kg', toUnit: 'lb' },
                { from: 'Ounces', to: 'Grams', factor: 28.3495, fromUnit: 'oz', toUnit: 'g' },
                { from: 'Grams', to: 'Ounces', factor: 0.035274, fromUnit: 'g', toUnit: 'oz' },
            ],
            temperature: [
                { from: 'Fahrenheit', to: 'Celsius', convert: (v) => (v - 32) * 5 / 9, convertBack: (v) => v * 9 / 5 + 32, fromUnit: '°F', toUnit: '°C' },
                { from: 'Celsius', to: 'Fahrenheit', convert: (v) => v * 9 / 5 + 32, convertBack: (v) => (v - 32) * 5 / 9, fromUnit: '°C', toUnit: '°F' },
            ],
            volume: [
                { from: 'Gallons', to: 'Liters', factor: 3.78541, fromUnit: 'gal', toUnit: 'L' },
                { from: 'Liters', to: 'Gallons', factor: 0.264172, fromUnit: 'L', toUnit: 'gal' },
                { from: 'Ounces', to: 'Milliliters', factor: 29.5735, fromUnit: 'fl oz', toUnit: 'mL' },
                { from: 'Milliliters', to: 'Ounces', factor: 0.033814, fromUnit: 'mL', toUnit: 'fl oz' },
            ],
        };

        let currentCategory = 'length';
        let conversionValues = {};

        function renderCategory(category) {
            const content = document.getElementById('converterContent');
            const items = conversions[category];
            let html = `<div class="grid gap-4">`;
            items.forEach((item, idx) => {
                const id = `${category}_${idx}`;
                conversionValues[id] = conversionValues[id] || { from: '', to: '' };
                html += `
                    <div class="conversion-row bg-gray-50 rounded-xl p-4 border border-gray-100">
                        <div class="flex flex-col sm:flex-row items-stretch sm:items-center gap-3">
                            <div class="flex-1">
                                <label class="block text-xs font-medium text-gray-500 mb-1.5">${item.from} (${item.fromUnit})</label>
                                <input type="number" id="from_${id}" class="conversion-input w-full px-4 py-2.5 rounded-lg border border-gray-200 focus:border-purple-400 focus:outline-none" placeholder="Enter ${item.from}" step="any" oninput="convertFrom('${category}', ${idx}, this.value)">
                            </div>
                            <div class="flex items-center justify-center">
                                <svg class="w-5 h-5 text-purple-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"/></svg>
                            </div>
                            <div class="flex-1">
                                <label class="block text-xs font-medium text-gray-500 mb-1.5">${item.to} (${item.toUnit})</label>
                                <input type="number" id="to_${id}" class="conversion-input w-full px-4 py-2.5 rounded-lg border border-gray-200 focus:border-purple-400 focus:outline-none" placeholder="Enter ${item.to}" step="any" oninput="convertTo('${category}', ${idx}, this.value)">
                            </div>
                        </div>
                    </div>
                `;
            });
            html += `</div>`;
            content.innerHTML = html;
        }

        function convertFrom(category, idx, value) {
            const id = `${category}_${idx}`;
            const item = conversions[category][idx];
            const toInput = document.getElementById(`to_${id}`);
            if (value === '' || isNaN(value)) {
                toInput.value = '';
                return;
            }
            const num = parseFloat(value);
            let result;
            if (item.convert) {
                result = item.convert(num);
            } else {
                result = num * item.factor;
            }
            toInput.value = roundResult(result);
        }

        function convertTo(category, idx, value) {
            const id = `${category}_${idx}`;
            const item = conversions[category][idx];
            const fromInput = document.getElementById(`from_${id}`);
            if (value === '' || isNaN(value)) {
                fromInput.value = '';
                return;
            }
            const num = parseFloat(value);
            let result;
            if (item.convertBack) {
                result = item.convertBack(num);
            } else {
                result = num / item.factor;
            }
            fromInput.value = roundResult(result);
        }

        function roundResult(num) {
            if (Math.abs(num) >= 1000) return Math.round(num * 100) / 100;
            if (Math.abs(num) >= 1) return Math.round(num * 1000) / 1000;
            return Math.round(num * 1000000) / 1000000;
        }

        // Category tab switching
        document.addEventListener('DOMContentLoaded', () => {
            renderCategory('length');

            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.category-btn').forEach(b => {
                        b.classList.remove('active', 'bg-gradient-to-r', 'from-purple-600', 'to-blue-500', 'text-white', 'shadow-md');
                        b.classList.add('bg-gray-100', 'text-gray-600', 'hover:bg-gray-200');
                    });
                    btn.classList.add('active', 'bg-gradient-to-r', 'from-purple-600', 'to-blue-500', 'text-white', 'shadow-md');
                    btn.classList.remove('bg-gray-100', 'text-gray-600', 'hover:bg-gray-200');
                    currentCategory = btn.dataset.category;
                    renderCategory(currentCategory);
                });
            });
        });
    </script>
