    <script>
        // US Federal Holidays computation
        function getFederalHolidays(year) {
            function nthWeekdayOfMonth(year, month, weekday, n) {
                const first = new Date(year, month, 1);
                const dayOfWeek = first.getDay();
                let diff = weekday - dayOfWeek;
                if (diff < 0) diff += 7;
                const day = 1 + diff + (n - 1) * 7;
                return new Date(year, month, day);
            }

            function lastMondayOfMay(year) {
                const lastDay = new Date(year, 4, 31);
                let day = lastDay.getDay();
                let diff = 1 - day; // Monday = 1
                if (diff > 0) diff -= 7;
                return new Date(year, 4, 31 + diff);
            }

            function nearestWeekday(date) {
                let d = new Date(date);
                const day = d.getDay();
                if (day === 0) d.setDate(d.getDate() + 1);
                if (day === 6) d.setDate(d.getDate() - 1);
                return d;
            }

            const holidays = [
                { name: "New Year's Day", date: new Date(year, 0, 1) },
                { name: "Martin Luther King Jr. Day", date: nthWeekdayOfMonth(year, 0, 1, 3) },
                { name: "Presidents' Day", date: nthWeekdayOfMonth(year, 1, 1, 3) },
                { name: "Memorial Day", date: lastMondayOfMay(year) },
                { name: "Juneteenth", date: new Date(year, 5, 19) },
                { name: "Independence Day", date: new Date(year, 6, 4) },
                { name: "Labor Day", date: nthWeekdayOfMonth(year, 8, 1, 1) },
                { name: "Columbus Day", date: nthWeekdayOfMonth(year, 9, 1, 2) },
                { name: "Veterans Day", date: new Date(year, 10, 11) },
                { name: "Thanksgiving Day", date: nthWeekdayOfMonth(year, 10, 4, 4) },
                { name: "Christmas Day", date: new Date(year, 11, 25) },
            ];

            // Apply weekend rule: if holiday falls on Saturday -> Friday before, Sunday -> Monday after
            holidays.forEach(h => {
                h.date = nearestWeekday(h.date);
                h.dayOfWeek = h.date.toLocaleDateString('en-US', { weekday: 'long' });
                h.formattedDate = h.date.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
            });

            return holidays;
        }

        function isToday(date) {
            const today = new Date();
            return date.getFullYear() === today.getFullYear() &&
                   date.getMonth() === today.getMonth() &&
                   date.getDate() === today.getDate();
        }

        let currentYear = new Date().getFullYear();
        let countdownTimer = null;

        function renderYear(year) {
            const holidays = getFederalHolidays(year);
            const list = document.getElementById('holidaysList');
            const label = document.getElementById('yearLabel');
            label.textContent = `${year} Federal Holidays`;

            let html = '';
            holidays.forEach((h, idx) => {
                const todayClass = isToday(h.date) ? ' today' : '';
                const todayBadge = isToday(h.date) ? '<span class="ml-2 px-2 py-0.5 text-xs bg-purple-100 text-purple-700 rounded-full">Today</span>' : '';
                html += `
                    <div class="holiday-row px-4 md:px-6 py-4${todayClass}">
                        <div class="flex items-center justify-between">
                            <div class="flex-1">
                                <div class="flex items-center flex-wrap">
                                    <span class="font-semibold text-gray-800">${h.name}</span>
                                    ${todayBadge}
                                </div>
                                <div class="text-sm text-gray-500 mt-0.5">${h.formattedDate}</div>
                            </div>
                            <div class="text-right flex-shrink-0 ml-4">
                                <span class="text-sm font-medium text-purple-600 bg-purple-50 px-3 py-1 rounded-full">${h.dayOfWeek}</span>
                            </div>
                        </div>
                    </div>
                `;
            });
            list.innerHTML = html;
            updateCountdown(year);
        }

        function updateCountdown(year) {
            const now = new Date();
            const holidays = getFederalHolidays(year);
            let nextHoliday = null;

            for (const h of holidays) {
                if (h.date > now) {
                    nextHoliday = h;
                    break;
                }
            }

            const content = document.getElementById('countdownContent');
            const noMore = document.getElementById('noMoreHolidays');

            if (!nextHoliday) {
                content.classList.add('hidden');
                noMore.classList.remove('hidden');
                if (countdownTimer) {
                    clearInterval(countdownTimer);
                    countdownTimer = null;
                }
                return;
            }

            content.classList.remove('hidden');
            noMore.classList.add('hidden');
            document.getElementById('nextHolidayName').textContent = nextHoliday.name;

            function tick() {
                const now = new Date();
                const diff = nextHoliday.date - now;
                if (diff <= 0) {
                    renderYear(currentYear);
                    return;
                }
                const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((diff % (1000 * 60)) / 1000);
                document.getElementById('countdownDays').textContent = String(days).padStart(2, '0');
                document.getElementById('countdownHours').textContent = String(hours).padStart(2, '0');
                document.getElementById('countdownMinutes').textContent = String(minutes).padStart(2, '0');
                document.getElementById('countdownSeconds').textContent = String(seconds).padStart(2, '0');
            }

            tick();
            if (countdownTimer) clearInterval(countdownTimer);
            countdownTimer = setInterval(tick, 1000);
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderYear(currentYear);

            document.querySelectorAll('.year-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.year-btn').forEach(b => {
                        b.classList.remove('active', 'bg-gradient-to-r', 'from-purple-600', 'to-blue-500', 'text-white', 'shadow-md');
                        b.classList.add('bg-gray-100', 'text-gray-600', 'hover:bg-gray-200');
                    });
                    btn.classList.add('active', 'bg-gradient-to-r', 'from-purple-600', 'to-blue-500', 'text-white', 'shadow-md');
                    btn.classList.remove('bg-gray-100', 'text-gray-600', 'hover:bg-gray-200');

                    const offset = btn.dataset.year;
                    if (offset === 'prev') renderYear(currentYear - 1);
                    else if (offset === 'next') renderYear(currentYear + 1);
                    else renderYear(currentYear);
                });
            });
        });
    </script>
</body>
</html>
