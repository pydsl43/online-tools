<body class="bg-gradient-to-br from-rose-50 via-orange-50 to-amber-50 min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-lg">
        <a href="/" class="text-gray-500 hover:text-gray-700 text-sm mb-4 inline-block">&larr; トップへ戻る</a>
        
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800 mb-2">📅 年齢計算</h1>

        </div>

        <div class="bg-white rounded-2xl shadow-lg p-6 mb-6">

                <label for="birthDate" class="block text-gray-700 font-medium mb-2">生年月日</label>

            </div>
            <button id="calcBtn" class="w-full py-3 rounded-xl font-bold text-lg text-white bg-gradient-to-r from-amber-500 to-orange-500 hover:from-amber-400 hover:to-orange-400 transition transform hover:scale-105 shadow-lg">
                計算する
            </button>
        </div>

        <div id="resultArea" class="hidden space-y-4">
            <div class="bg-white rounded-2xl shadow-lg p-6">
                <h2 class="text-lg font-bold text-gray-800 mb-4 border-b pb-2">基本情報</h2>
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-amber-50 rounded-xl p-4 text-center">
                        <p class="text-sm text-gray-500">年齢</p>
                        <p class="text-3xl font-bold text-amber-600" id="displayAge">25</p>
                        <p class="text-sm text-gray-400" id="displayAgeDetail">25年0ヶ月0日</p>
                    </div>
                    <div class="bg-rose-50 rounded-xl p-4 text-center">
                        <p class="text-sm text-gray-500">星座</p>
                        <p class="text-2xl font-bold text-rose-600" id="displayZodiac">牡羊座</p>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow-lg p-6">
                <h2 class="text-lg font-bold text-gray-800 mb-4 border-b pb-2">詳細情報</h2>
                <div class="space-y-3">
                    <div class="flex justify-between items-center py-2 border-b border-gray-100">
                        <span class="text-gray-600">生まれてからの日数</span>
                        <span class="text-xl font-bold text-gray-800" id="displayDaysAlive">9,125</span>
                        <span class="text-gray-400 text-sm">日</span>
                    </div>
                    <div class="flex justify-between items-center py-2 border-b border-gray-100">
                        <span class="text-gray-600">次の誕生日まで</span>
                        <span class="text-xl font-bold text-blue-600" id="displayDaysToNext">150</span>
                        <span class="text-gray-400 text-sm">日</span>
                    </div>
                    <div class="flex justify-between items-center py-2 border-b border-gray-100">
                        <span class="text-gray-600">生年月日（和暦）</span>
                        <span class="text-lg font-bold text-gray-800" id="displayWareki">令和2年1月1日</span>
                    </div>
                    <div class="flex justify-between items-center py-2">
                        <span class="text-gray-600">生まれた曜日</span>

    <script>
        const zodiacData = [
            { name: '牡羊座', start: '03-21', end: '04-19' },
            { name: '牡牛座', start: '04-20', end: '05-20' },
            { name: '双子座', start: '05-21', end: '06-21' },
            { name: '蟹座', start: '06-22', end: '07-22' },
            { name: '獅子座', start: '07-23', end: '08-22' },
            { name: '乙女座', start: '08-23', end: '09-22' },
            { name: '天秤座', start: '09-23', end: '10-23' },
            { name: '蠍座', start: '10-24', end: '11-22' },
            { name: '射手座', start: '11-23', end: '12-21' },
            { name: '山羊座', start: '12-22', end: '01-19' },
            { name: '水瓶座', start: '01-20', end: '02-18' },
            { name: '魚座', start: '02-19', end: '03-20' }
        ];

        const weekdayNames = ['日曜日', '月曜日', '火曜日', '水曜日', '木曜日', '金曜日', '土曜日'];

        function toWareki(year, month, day) {
            const date = new Date(year, month - 1, day);
            if (year >= 2019 || (year === 2019 && month >= 5)) {
                const reiwa = year - 2018;
                return `令和${reiwa === 1 ? '元' : reiwa}年${month}月${day}日`;
            } else if (year >= 1989 || (year === 1989 && month >= 1)) {
                const heisei = year - 1988;
                return `平成${heisei === 1 ? '元' : heisei}年${month}月${day}日`;
            } else if (year >= 1926 || (year === 1926 && month >= 12) || (year === 1926 && month === 12 && day >= 25)) {
                const showa = year - 1925;
                return `昭和${showa}年${month}月${day}日`;
            }
            return `${year}年${month}月${day}日`;
        }

        function getZodiac(month, day) {
            const md = String(month).padStart(2, '0') + '-' + String(day).padStart(2, '0');
            for (const z of zodiacData) {
                if (z.start <= z.end) {
                    if (md >= z.start && md <= z.end) return z.name;
                } else {
                    //跨越年份的星座（山羊座）
                    if (md >= z.start || md <= z.end) return z.name;
                }
            }
            return '山羊座';
        }

        function calculate() {
            const dateStr = document.getElementById('birthDate').value;
            if (!dateStr) return;
            
            const [y, m, d] = dateStr.split('-').map(Number);
            const birth = new Date(y, m - 1, d);
            const now = new Date();
            
            if (birth > now) {
                alert('生年月日が未来の日付です');
                return;
            }

            // Age calculation
            let ageYears = now.getFullYear() - birth.getFullYear();
            let ageMonths = now.getMonth() - birth.getMonth();
            let ageDays = now.getDate() - birth.getDate();
            if (ageDays < 0) {
                ageMonths--;
                const prevMonth = new Date(now.getFullYear(), now.getMonth(), 0);
                ageDays += prevMonth.getDate();
            }
            if (ageMonths < 0) {
                ageYears--;
                ageMonths += 12;
            }

            document.getElementById('displayAge').textContent = ageYears;
            document.getElementById('displayAgeDetail').textContent = `${ageYears}年${ageMonths}ヶ月${ageDays}日`;

            // Days alive
            const diff = now - birth;
            const daysAlive = Math.floor(diff / (1000 * 60 * 60 * 24));
            document.getElementById('displayDaysAlive').textContent = daysAlive.toLocaleString();

            // Days to next birthday
            const nextBirthday = new Date(now.getFullYear(), m - 1, d);
            if (nextBirthday < now) {
                nextBirthday.setFullYear(nextBirthday.getFullYear() + 1);
            }
            const daysToNext = Math.ceil((nextBirthday - now) / (1000 * 60 * 60 * 24));
            document.getElementById('displayDaysToNext').textContent = daysToNext;

            // Zodiac
            document.getElementById('displayZodiac').textContent = getZodiac(m, d);

            // Wareki
            document.getElementById('displayWareki').textContent = toWareki(y, m, d);

            // Weekday
            document.getElementById('displayWeekday').textContent = weekdayNames[birth.getDay()];

            document.getElementById('resultArea').classList.remove('hidden');
        }

        document.getElementById('calcBtn').addEventListener('click', calculate);
        document.getElementById('birthDate').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') calculate();
        });

        // Set default to today - 20 years
        const today = new Date();
        const def = new Date(today.getFullYear() - 20, today.getMonth(), today.getDate());
        document.getElementById('birthDate').value = def.toISOString().split('T')[0];
    </script>
